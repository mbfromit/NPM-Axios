name = "ratcatcher"
main = "src/index.js"
compatibility_date = "2025-01-01"

[[d1_databases]]
binding = "DB"
database_name = "ratcatcher"
database_id = "b535d898-8007-4fc8-8f41-63da8dd1f1a3"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "ratcatcher-reports"

[[routes]]
pattern = "mbfromit.com/ratcatcher/*"
zone_name = "mbfromit.com"

[triggers]
crons = ["*/5 * * * *"]

# ── Dev environment (feature/ai-verification) ────────────────────────────────
[env.dev]
name = "ratcatcher-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "ratcatcher-dev"
database_id = "90e9640b-afe2-4e81-9734-b1a0731b5e91"

[[env.dev.r2_buckets]]
binding = "BUCKET"
bucket_name = "ratcatcher-dev-reports"

[[env.dev.routes]]
pattern = "mbfromit.com/ratcatcher-dev/*"
zone_name = "mbfromit.com"
